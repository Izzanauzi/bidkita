# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/bidkita
spring.datasource.username=bidkita_user
spring.datasource.password=bidkita123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=bidkita-secret-key-yang-sangat-panjang-minimal-256-bit-untuk-hmac-sha256-algorithm
jwt.expiration=86400000

# Server
server.port=8080

# Scheduler
spring.task.scheduling.pool.size=5

# Multipart (untuk base64 image yang besar)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=20MB
spring.codec.max-in-memory-size=20MB
